name: jellyfin
services:
  web:
    image: jellyfin:local
    ports:
      - 8096:8096
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ./media:/media
    network: jellyfin-net
    aliases:
      - web
    restart: always
    healthcheck: CMD-SHELL curl -f http://127.0.0.1:8096/ || exit 1
networks:
  - jellyfin-net
