name: n8n
services:
  web:
    image: n8n:local
    ports:
      - 5678:5678
    env:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=change-me
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n-data:/home/node/.n8n
    network: n8n-net
    aliases:
      - web
    depends_on:
      - db
    restart: always
    healthcheck: CMD-SHELL wget -qO- http://127.0.0.1:5678/healthz || exit 1
  db:
    image: postgres:local
    env:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=change-me
    volumes:
      - n8n-db:/var/lib/postgresql/data
    network: n8n-net
    aliases:
      - db
    restart: always
    healthcheck: CMD-SHELL pg_isready -h 127.0.0.1 -U n8n -d n8n || exit 1
networks:
  - n8n-net
